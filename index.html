<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiniela</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <p>MUNDIAL 2026 · CUARTOS DE FINAL</p>
  <h1>⚽ Quiniela </h1>
  <span id="updated">Cargando...</span>
</header>

<main>
  <section class="card">
    <h2>🏆 Ranking</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>#</th><th>Nombre</th><th>Puntos</th></tr>
        </thead>
        <tbody id="ranking"><tr><td colspan="3">Cargando...</td></tr></tbody>
      </table>
    </div>
  </section>

  <section class="card">
    <div class="title-row">
      <h2>⚽ Cuartos de final</h2>
      <button id="refresh">Actualizar</button>
    </div>
    <div id="matches" class="matches"></div>
  </section>
</main>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
