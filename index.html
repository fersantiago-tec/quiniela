<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Quiniela </title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f4f5f7;
      color: #171717;
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      background: #111827;
      color: white;
      padding: 28px 18px;
    }

    header > * {
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
    }

    header p {
      font-size: 12px;
      letter-spacing: 2px;
      margin-top: 0;
      margin-bottom: 5px;
    }

    header h1 {
      font-size: 34px;
      margin-top: 0;
      margin-bottom: 8px;
    }

    header span {
      font-size: 13px;
      color: #cbd5e1;
    }

    main {
      max-width: 1000px;
      margin: 24px auto;
      padding: 0 15px;
      display: grid;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #e5e7eb;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 18px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }

    button {
      background: #111827;
      color: white;
      border: none;
      border-radius: 9px;
      padding: 9px 13px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      text-align: left;
      padding: 13px 10px;
      border-bottom: 1px solid #eeeeee;
    }

    th {
      font-size: 13px;
      color: #6b7280;
    }

    .matches {
      display: grid;
      gap: 14px;
    }

    .match {
      border: 1px solid #e5e7eb;
      border-radius: 13px;
      overflow: hidden;
    }

    .match-head {
      padding: 10px 14px;
      background: #f9fafb;
      font-size: 13px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .status-live {
      color: #dc2626;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      text-align: center;
      padding: 15px;
      font-weight: bold;
    }

    .real-score {
      font-size: 23px;
      padding: 0 15px;
      white-space: nowrap;
    }

    .picks {
      border-top: 1px solid #eeeeee;
      padding: 10px 14px;
      display: grid;
      grid-template-columns: repeat(
        auto-fit,
        minmax(220px, 1fr)
      );
      gap: 7px;
    }

    .pick {
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      background: #f9fafb;
      padding: 8px 10px;
      border-radius: 7px;
    }

    .pts {
      font-weight: bold;
      white-space: nowrap;
    }

    .error {
      padding: 15px;
      background: #fef2f2;
      color: #991b1b;
      border-radius: 10px;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 28px;
      }

      .scoreboard {
        font-size: 14px;
      }

      .card {
        padding: 14px;
      }

      .real-score {
        font-size: 20px;
        padding: 0 8px;
      }
    }
  </style>
</head>

<body>

  <header>
    <p>MUNDIAL 2026 · CUARTOS DE FINAL</p>

    <h1>⚽ Quiniela </h1>

    <span id="updated">
      Cargando...
    </span>
  </header>


  <main>

    <!-- RANKING -->

    <section class="card">

      <h2>🏆 Ranking</h2>

      <div class="table-wrap">

        <table>

          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Puntos</th>
              <th>Exactos</th>
            </tr>
          </thead>

          <tbody id="ranking">

            <tr>
              <td colspan="4">
                Cargando...
              </td>
            </tr>

          </tbody>

        </table>

      </div>

    </section>


    <!-- PARTIDOS -->

    <section class="card">

      <div class="title-row">

        <h2>⚽ Cuartos de final</h2>

        <button id="refresh">
          Actualizar
        </button>

      </div>

      <div
        id="matches"
        class="matches"
      ></div>

    </section>

  </main>


  <script>

    /*
    ==============================
    CONFIGURACIÓN
    ==============================
    */

    const CONFIG = {

      predictionsUrl: "pronosticos.csv",

      matchesApi:
        "https://worldcup26.ir/get/games",

      refreshMs: 60000,

      matches: [

        {
          id: "53452525",

          home: "France",
          away: "Morocco",

          homeCol: "Francia",
          awayCol: "Marruecos",

          winnerCol:
            "Gana Francia-Marruecos"
        },

        {
          id: "53452527",

          home: "Spain",
          away: "Belgium",

          homeCol: "España",
          awayCol: "Bélgica",

          winnerCol:
            "Gana España-Bélgica"
        },

        {
          id: "53452529",

          home: "Norway",
          away: "England",

          homeCol: "Noruega",
          awayCol: "Inglaterra",

          winnerCol:
            "Gana Noruega-Inglaterra"
        },

        {
          id: "53452531",

          home: "Argentina",
          away: "Switzerland",

          homeCol: "Argentina",
          awayCol: "Suiza",

          winnerCol:
            "Gana Argentina-Suiza"
        }

      ]
    };


    let people = [];

    let apiGames = [];


    /*
    ==============================
    CSV
    ==============================
    */

    function splitCSV(line) {

      const result = [];

      let current = "";

      let quotes = false;


      for (
        let i = 0;
        i < line.length;
        i++
      ) {

        const char = line[i];


        if (char === '"') {

          if (
            quotes &&
            line[i + 1] === '"'
          ) {

            current += '"';

            i++;

          } else {

            quotes = !quotes;

          }

        }

        else if (
          char === "," &&
          !quotes
        ) {

          result.push(current);

          current = "";

        }

        else {

          current += char;

        }

      }


      result.push(current);


      return result;
    }


    function parseCSV(text) {

      const lines =
        text
          .trim()
          .split(/\r?\n/);


      if (!lines.length) {

        return [];

      }


      const headers =
        splitCSV(lines[0])
          .map(
            item =>
              item.trim()
          );


      return lines
        .slice(1)
        .filter(Boolean)
        .map(line => {

          const values =
            splitCSV(line);


          return Object.fromEntries(

            headers.map(
              (header, index) => [

                header,

                (
                  values[index] ?? ""
                ).trim()

              ]
            )

          );

        });

    }


    /*
    Corrige archivos guardados
    incorrectamente como ANSI /
    Windows-1252.
    */

    async function loadPeople() {

      const response =
        await fetch(

          CONFIG.predictionsUrl,

          {
            cache: "no-store"
          }

        );


      if (!response.ok) {

        throw new Error(
          "No se pudo cargar pronosticos.csv"
        );

      }


      const buffer =
        await response.arrayBuffer();


      let text =
        new TextDecoder(
          "utf-8"
        ).decode(buffer);


      /*
      Si aparecen caracteres rotos
      como �, intenta Windows-1252.
      */

      if (
        text.includes("�")
      ) {

        text =
          new TextDecoder(
            "windows-1252"
          ).decode(buffer);

      }


      people =
        parseCSV(text);

    }


    /*
    ==============================
    NORMALIZACIÓN DE TEXTO
    ==============================
    */

    function normalizeText(value) {

      return String(
        value ?? ""
      )

        .trim()

        .toLowerCase()

        .normalize("NFD")

        .replace(
          /[\u0300-\u036f]/g,
          ""
        )

        .replace(
          /\s+/g,
          " "
        );

    }


    /*
    Convierte el pronóstico de ganador
    a:

    H = equipo 1
    A = equipo 2
    D = empate
    */

    function normalizeWinner(
      value,
      match
    ) {

      const valueNormalized =
        normalizeText(value);


      const homeSpanish =
        normalizeText(
          match.homeCol
        );


      const awaySpanish =
        normalizeText(
          match.awayCol
        );


      const homeEnglish =
        normalizeText(
          match.home
        );


      const awayEnglish =
        normalizeText(
          match.away
        );


      const empateValues = [

        "empate",

        "empate.",

        "x",

        "draw",

        "igual",

        "igualados",

        "tie"

      ];


      if (
        empateValues.includes(
          valueNormalized
        )
      ) {

        return "D";

      }


      if (
        valueNormalized ===
          homeSpanish ||

        valueNormalized ===
          homeEnglish
      ) {

        return "H";

      }


      if (
        valueNormalized ===
          awaySpanish ||

        valueNormalized ===
          awayEnglish
      ) {

        return "A";

      }


      return "";

    }


    /*
    ==============================
    API DE PARTIDOS
    ==============================
    */

    function safeNumber(value) {

      if (
        value === null ||
        value === undefined ||
        value === ""
      ) {

        return null;

      }


      const number =
        Number(value);


      return Number.isFinite(number)
        ? number
        : null;

    }


    function normalizeApiGame(
      raw,
      index
    ) {

      const statusText =

        String(

          raw.time_elapsed ??

          raw.status ??

          raw.match_status ??

          ""

        ).toLowerCase();


      const finished =

        raw.finished === true ||

        String(
          raw.finished
        ).toLowerCase() === "true" ||

        /finished|final|ft|complete|ended/
          .test(statusText);


      const live =

        !finished &&

        statusText &&

        !/notstarted|not started|scheduled|upcoming/
          .test(statusText);


      return {

        id: String(

          raw.id ??

          raw.game_id ??

          raw.number ??

          index + 1

        ),


        home: String(

          raw.home_team_name_en ??

          raw.home_team_label ??

          raw.home_team?.name ??

          raw.home_team ??

          ""

        ),


        away: String(

          raw.away_team_name_en ??

          raw.away_team_label ??

          raw.away_team?.name ??

          raw.away_team ??

          ""

        ),


        hs: safeNumber(

          raw.home_score ??

          raw.score_home ??

          raw.home_goals ??

          raw.score?.home ??

          null

        ),


        as: safeNumber(

          raw.away_score ??

          raw.score_away ??

          raw.away_goals ??

          raw.score?.away ??

          null

        ),


        state:

          finished
            ? "FINAL"

          : live
            ? "EN VIVO"

          : "PRÓXIMO"

      };

    }


    async function loadGames() {

      const response =
        await fetch(

          CONFIG.matchesApi,

          {
            cache: "no-store"
          }

        );


      if (!response.ok) {

        throw new Error(
          "No se pudieron cargar los resultados"
        );

      }


      const data =
        await response.json();


      const gamesArray =

        Array.isArray(data)

          ? data

          : (

            data.games ??

            data.matches ??

            data.data ??

            []

          );


      apiGames =

        gamesArray.map(
          normalizeApiGame
        );

    }


    /*
    ==============================
    ENCONTRAR PARTIDO
    ==============================
    */

    function findGame(configMatch) {

      /*
      Primero intenta por ID.
      */

      const byId =

        apiGames.find(

          game =>
            game.id ===
            configMatch.id

        );


      if (byId) {

        return byId;

      }


      /*
      Después intenta por nombres.
      */

      const byTeams =

        apiGames.find(

          game =>

            normalizeText(
              game.home
            ) ===

            normalizeText(
              configMatch.home
            )

            &&

            normalizeText(
              game.away
            ) ===

            normalizeText(
              configMatch.away
            )

        );


      if (byTeams) {

        return byTeams;

      }


      /*
      Fallback.
      */

      return {

        id:
          configMatch.id,

        home:
          configMatch.home,

        away:
          configMatch.away,

        hs: null,

        as: null,

        state:
          "PRÓXIMO"

      };

    }


    /*
    ==============================
    RESULTADO
    ==============================
    */

    function realOutcome(game) {

      if (
        game.hs === game.as
      ) {

        return "D";

      }


      return game.hs > game.as
        ? "H"
        : "A";

    }


    /*
    ==============================
    PUNTUACIÓN
    ==============================

    3 puntos:
    marcador exacto

    1 punto:
    ganador o empate correcto

    0 puntos:
    incorrecto
    */

    function scorePrediction(
      person,
      configMatch,
      game
    ) {

      if (
        game.state !== "FINAL"
      ) {

        return {

          points: 0,

          exact: false

        };

      }


      if (
        !Number.isFinite(game.hs) ||
        !Number.isFinite(game.as)
      ) {

        return {

          points: 0,

          exact: false

        };

      }


      const predictedHome =
        Number(
          person[
            configMatch.homeCol
          ]
        );


      const predictedAway =
        Number(
          person[
            configMatch.awayCol
          ]
        );


      /*
      Marcador exacto.
      */

      if (

        Number.isFinite(
          predictedHome
        )

        &&

        Number.isFinite(
          predictedAway
        )

        &&

        predictedHome ===
          game.hs

        &&

        predictedAway ===
          game.as

      ) {

        return {

          points: 3,

          exact: true

        };

      }


      /*
      Resultado:
      ganador o empate.
      */

      const predictedWinner =

        normalizeWinner(

          person[
            configMatch.winnerCol
          ],

          configMatch

        );


      if (

        predictedWinner &&

        predictedWinner ===
          realOutcome(game)

      ) {

        return {

          points: 1,

          exact: false

        };

      }


      return {

        points: 0,

        exact: false

      };

    }


    /*
    ==============================
    SEGURIDAD TEXTO HTML
    ==============================
    */

    function escapeHtml(value) {

      return String(
        value ?? ""
      )

        .replaceAll(
          "&",
          "&amp;"
        )

        .replaceAll(
          "<",
          "&lt;"
        )

        .replaceAll(
          ">",
          "&gt;"
        )

        .replaceAll(
          '"',
          "&quot;"
        );

    }


    /*
    ==============================
    RANKING
    ==============================
    */

    function buildRanking() {

      return people

        .map(person => {

          let points = 0;

          let exact = 0;


          CONFIG.matches
            .forEach(configMatch => {

              const game =
                findGame(
                  configMatch
                );


              const result =

                scorePrediction(

                  person,

                  configMatch,

                  game

                );


              points +=
                result.points;


              if (
                result.exact
              ) {

                exact++;

              }

            });


          return {

            name:
              person.Nombre,

            points,

            exact

          };

        })

        .sort(
          (a, b) =>

            b.points -
              a.points

            ||

            b.exact -
              a.exact

            ||

            a.name.localeCompare(
              b.name,
              "es"
            )

        );

    }


    function renderRanking() {

      const ranking =
        buildRanking();


      const tbody =
        document.getElementById(
          "ranking"
        );


      tbody.innerHTML =

        ranking.map(
          (player, index) => {

            const position =

              index === 0
                ? "🥇"

              : index === 1
                ? "🥈"

              : index === 2
                ? "🥉"

              : index + 1;


            return `

              <tr>

                <td>
                  ${position}
                </td>

                <td>
                  ${escapeHtml(
                    player.name
                  )}
                </td>

                <td>
                  <strong>
                    ${player.points}
                  </strong>
                </td>

                <td>
                  ${player.exact}
                </td>

              </tr>

            `;

          }

        ).join("");

    }


    /*
    ==============================
    MOSTRAR MARCADOR
    ==============================
    */

    function displayScore(game) {

      /*
      No muestra 0-0 antes
      de que empiece.
      */

      if (
        game.state === "PRÓXIMO"
      ) {

        return "– - –";

      }


      /*
      Evita NaN.
      */

      if (

        !Number.isFinite(game.hs)

        ||

        !Number.isFinite(game.as)

      ) {

        return "– - –";

      }


      return `
        ${game.hs} - ${game.as}
      `;

    }


    /*
    ==============================
    PARTIDOS
    ==============================
    */

    function renderMatches() {

      const container =

        document.getElementById(
          "matches"
        );


      container.innerHTML =

        CONFIG.matches.map(
          configMatch => {

            const game =
              findGame(
                configMatch
              );


            const statusClass =

              game.state === "EN VIVO"

                ? "status-live"

                : "";


            return `

              <article class="match">


                <div class="match-head">

                  <span>

                    ${escapeHtml(
                      configMatch.homeCol
                    )}

                    vs

                    ${escapeHtml(
                      configMatch.awayCol
                    )}

                  </span>


                  <span class="${statusClass}">

                    ${game.state}

                  </span>

                </div>


                <div class="scoreboard">


                  <span>

                    ${escapeHtml(
                      configMatch.homeCol
                    )}

                  </span>


                  <span class="real-score">

                    ${displayScore(game)}

                  </span>


                  <span>

                    ${escapeHtml(
                      configMatch.awayCol
                    )}

                  </span>


                </div>


                <div class="picks">


                  ${people.map(person => {


                    const homeGoals =

                      person[
                        configMatch.homeCol
                      ] ?? "—";


                    const awayGoals =

                      person[
                        configMatch.awayCol
                      ] ?? "—";


                    const winner =

                      person[
                        configMatch.winnerCol
                      ] ?? "—";


                    const result =

                      scorePrediction(

                        person,

                        configMatch,

                        game

                      );


                    return `

                      <div class="pick">

                        <span>

                          ${escapeHtml(
                            person.Nombre
                          )}:

                          ${escapeHtml(
                            homeGoals
                          )}

                          -

                          ${escapeHtml(
                            awayGoals
                          )}

                          ·

                          ${escapeHtml(
                            winner
                          )}

                        </span>


                        <span class="pts">

                          ${
                            game.state ===
                            "FINAL"

                              ? "+" +
                                result.points

                              : ""
                          }

                        </span>

                      </div>

                    `;

                  }).join("")}


                </div>


              </article>

            `;

          }

        ).join("");

    }


    /*
    ==============================
    ACTUALIZAR TODO
    ==============================
    */

    async function refresh() {

      const button =

        document.getElementById(
          "refresh"
        );


      button.disabled = true;


      try {

        await Promise.all([

          loadPeople(),

          loadGames()

        ]);


        renderRanking();

        renderMatches();


        document.getElementById(
          "updated"
        ).textContent =

          "Actualizado: " +

          new Date()
            .toLocaleTimeString(
              "es-MX",
              {
                hour:
                  "2-digit",

                minute:
                  "2-digit",

                second:
                  "2-digit"
              }
            );

      }

      catch (error) {

        console.error(error);


        document.getElementById(
          "updated"
        ).textContent =

          "Error: " +
          error.message;


        document.getElementById(
          "matches"
        ).innerHTML = `

          <div class="error">

            ${escapeHtml(
              error.message
            )}

          </div>

        `;

      }

      finally {

        button.disabled =
          false;

      }

    }


    /*
    ==============================
    INICIO
    ==============================
    */

    document
      .getElementById("refresh")
      .addEventListener(
        "click",
        refresh
      );


    refresh();


    setInterval(

      refresh,

      CONFIG.refreshMs

    );

  </script>

</body>
</html>
